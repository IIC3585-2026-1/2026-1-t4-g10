<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pocket Notes</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />

  <meta name="theme-color" content="#111827" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Pocket Notes</h1>
      <p id="status">Online</p>
    </header>

    <section class="composer">
      <input id="noteTitle" placeholder="Título de la nota" />
      <textarea id="noteBody" placeholder="Escribe una nota..."></textarea>

      <button id="saveNote">Guardar nota</button>
      <button id="notifyBtn">Probar notificación</button>
    </section>

    <section>
      <input id="searchInput" placeholder="Buscar notas..." />
      <div id="notesList"></div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
